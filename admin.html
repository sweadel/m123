<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <title>إدارة قائمة الطعام - Tallo Ahbabna</title>
    <meta name="description" content="لوحة تحكم متكاملة لإدارة أقسام وأطباق القائمة باللغة العربية، مع إعادة ترتيب، تفعيل/إلغاء، وحفظ التغييرات في Firebase.">
    <link rel="stylesheet" href="css/admin.css" />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;600;800&display=swap" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.23.0/firebase-app-compat.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.23.0/firebase-database-compat.min.js"></script>
    <script src="js/admin.js" defer></script>
</head>
<body>
    <div class="admin-wrapper">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <img src="assets/logo.png" alt="شعار المطعم" />
            </div>
            <nav class="sidebar-menu">
                <a href="#" class="menu-item active"><i class="fas fa-utensils"></i>قائمة الطعام</a>
                <a href="#" class="menu-item"><i class="fas fa-chart-line"></i>تقارير</a>
                <a href="#" class="menu-item"><i class="fas fa-cog"></i>الإعدادات</a>
            </nav>
            <div class="sidebar-footer">
                <button class="btn-primary" id="logoutBtn"><i class="fas fa-sign-out-alt"></i>تسجيل الخروج</button>
            </div>
        </aside>
        <!-- Main Content -->
        <main class="main-content">
            <header class="page-header">
                <div class="page-title">
                    <h1>إدارة قائمة الطعام</h1>
                    <p>أضف، حرر، رتب، أو احذف الأقسام والأطباق.</p>
                </div>
                <div class="header-actions">
                    <button class="btn-primary" id="addCategoryBtn"><i class="fas fa-plus"></i>قسم جديد</button>
                    <button class="btn-primary" id="exportItemsBtn"><i class="fas fa-file-export"></i>تصدير CSV</button>
                    <input type="file" id="importItemsInput" accept=".csv" style="display:none;" />
                    <button class="btn-primary" id="importItemsBtn"><i class="fas fa-file-import"></i>استيراد CSV</button>
                </div>
            </header>

            <div id="toast-container" class="toast-container"></div>

            <!-- Category Filter Tabs -->
            <div class="cat-filter-tabs" id="categoryTabs"></div>
            <div class="bulk-actions" id="itemsBulkActions" style="display:none; margin-top:10px;">
                <input type="checkbox" id="selectAllItems" /> <label for="selectAllItems">تحديد الكل</label>
                <button class="btn-primary-sm" id="bulkActivateItems"><i class="fas fa-check"></i>تفعيل</button>
                <button class="btn-primary-sm" id="bulkDeactivateItems"><i class="fas fa-ban"></i>إلغاء تفعيل</button>
                <button class="btn-danger-sm" id="bulkDeleteItems"><i class="fas fa-trash"></i>حذف</button>
                <button class="btn-primary-sm" id="exportSelectedItems"><i class="fas fa-file-export"></i>تصدير مختار</button>
            </div>

            <!-- Categories Section -->
            <section class="data-card" style="margin-bottom: 2rem;">
                <div class="table-header">
                    <h2>الأقسام</h2>
                    <button class="btn-primary" id="addCategoryBtnHeader" onclick="openCatModal()"><i class="fas fa-plus"></i>قسم جديد</button>
                </div>
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>أيقونة</th>
                                <th>الاسم</th>
                                <th>الفرع</th>
                                <th>عدد الأطباق</th>
                                <th>الترتيب</th>
                                <th>الحالة</th>
                                <th>إجراءات</th>
                            </tr>
                        </thead>
                        <tbody id="cat-table-body"></tbody>
                    </table>
                </div>
            </section>

            <!-- Items Section -->
            <section class="data-card">
                <div class="table-header">
                    <h2>الأطباق</h2>
                    <div style="display:flex; gap:10px;">
                        <input type="text" id="globalSearch" placeholder="بحث بالاسم..." class="form-control-sm" onkeyup="renderTable()" style="width: 200px;" />
                        <button class="btn-primary" id="addItemBtn" onclick="openItemModal()"><i class="fas fa-plus"></i>طبق جديد</button>
                    </div>
                </div>
                <div class="table-responsive">
                    <div class="pagination" id="itemsPagination" style="margin-bottom: 10px;"></div>
                    <table id="itemsTable">
                        <thead>
                            <tr>
                                <th>اختيار</th>
                                <th>صورة</th>
                                <th>الاسم</th>
                                <th>القسم</th>
                                <th>السعر</th>
                                <th>الحالة</th>
                                <th>ترتيب</th>
                                <th>إجراءات</th>
                            </tr>
                        </thead>
                        <tbody id="menu-table-body"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <!-- Modals -->
    <!-- Item Modal -->
    <div class="modal-overlay" id="itemModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">إضافة وجبة جديدة</h3>
                <button class="btn-icon" onclick="closeItemModal()"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <form id="itemForm" onsubmit="event.preventDefault(); saveItem();">
                    <div class="form-group">
                        <label>اسم الطبق (عربي)</label>
                        <input type="text" id="itemName" required />
                    </div>
                    <div class="form-group">
                        <label>اسم الطبق (إنجليزي)</label>
                        <input type="text" id="itemNameEn" />
                    </div>
                    <div class="form-group">
                        <label>القسم</label>
                        <select id="itemCategory" required></select>
                    </div>
                    <div class="form-group">
                        <label>السعر (JD)</label>
                        <input type="number" step="0.01" id="itemPrice" required />
                    </div>
                    <div class="form-group">
                        <label>مسار الصورة أو الرابط</label>
                        <input type="text" id="itemImg" />
                        <div id="image-preview" style="margin-top:10px;"></div>
                    </div>
                    <div class="form-group">
                        <label>الوصف (عربي)</label>
                        <textarea id="itemDesc"></textarea>
                    </div>
                    <div class="form-group">
                        <label>الوصف (إنجليزي)</label>
                        <textarea id="itemDescEn"></textarea>
                    </div>
                    <div class="form-group">
                        <label>شارة التميز</label>
                        <select id="itemBadge">
                            <option value="">لا يوجد</option>
                            <option value="HOT">حار 🔥</option>
                            <option value="NEW">جديد ✨</option>
                            <option value="SPECIAL">مميز ⭐</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>الحالة</label>
                        <select id="itemStatus">
                            <option value="active">نشط</option>
                            <option value="inactive">مخفي</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn-primary" onclick="saveItem()">حفظ التغييرات</button>
                <button class="btn-icon" onclick="closeItemModal()">إلغاء</button>
            </div>
        </div>
    </div>

    <!-- Category Modal -->
    <div class="modal-overlay" id="catModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="catModalTitle">إضافة قسم جديد</h3>
                <button class="btn-icon" onclick="closeCatModal()"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <form id="catForm" onsubmit="event.preventDefault(); saveCategory();">
                    <div class="form-group">
                        <label>اسم القسم (عربي)</label>
                        <input type="text" id="catNameAr" required />
                    </div>
                    <div class="form-group">
                        <label>اسم القسم (إنجليزي)</label>
                        <input type="text" id="catNameEn" />
                    </div>
                    <div class="form-group">
                        <label>الوصف (عربي)</label>
                        <textarea id="catDescAr"></textarea>
                    </div>
                    <div class="form-group">
                        <label>الوصف (إنجليزي)</label>
                        <textarea id="catDescEn"></textarea>
                    </div>
                    <div class="form-group">
                        <label>الفرع الرئيسي</label>
                        <select id="catSection">
                            <option value="arabic">المنيو العربي</option>
                            <option value="intl">انترناشونال</option>
                            <option value="desserts">الحلويات</option>
                            <option value="drinks">المشروبات</option>
                            <option value="argileh">الأراجيل</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>أيقونة (FontAwesome)</label>
                        <input type="text" id="catIcon" placeholder="fa-pizza-slice" />
                        <div id="icon-preview" style="font-size:2rem; margin-top:10px; color:var(--gold);"></div>
                    </div>
                    <div class="form-group">
                        <label>الترتيب</label>
                        <input type="number" id="catOrder" value="0" />
                    </div>
                    <div class="form-group">
                        <label>الحالة</label>
                        <div style="display:flex; gap:10px; margin-top:5px;">
                            <label><input type="radio" name="catStatus" value="active" checked> نشط</label>
                            <label><input type="radio" name="catStatus" value="inactive"> مخفي</label>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn-primary" onclick="saveCategory()">حفظ القسم</button>
                <button class="btn-icon" onclick="closeCatModal()">إلغاء</button>
            </div>
        </div>
    </div>
</body>
</html>
