<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tallo Ahbabna | Digital Menu</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <header class="main-header">
            <div class="header-overlay"></div>
            <div class="header-content">
                <img src="images/tallo-logo.png" alt="Tallo Ahbabna" class="logo">
                <h1 id="site-tagline">Welcome to Tallo Ahbabna</h1>
                <div class="header-actions"><a href="menu.html" class="lang-switch">العربية</a></div>
            </div>
            <div class="header-arch"></div>
        </header>

        <nav class="category-nav" id="category-tabs"></nav>
        <main class="menu-container" id="menu-sections"></main>

        <div class="rate-us-btn" onclick="openFeedback()"><i class="fa-solid fa-star"></i></div>
        <div class="feedback-modal" id="feedbackModal">
            <div class="feedback-content">
                <h2 style="color:var(--gold); margin-bottom:10px;">Your Opinion Matters ✨</h2>
                <div class="star-rating" id="stars">
                    <i class="fa-solid fa-star" data-val="1"></i><i class="fa-solid fa-star" data-val="2"></i><i class="fa-solid fa-star" data-val="3"></i><i class="fa-solid fa-star" data-val="4"></i><i class="fa-solid fa-star" data-val="5"></i>
                </div>
                <input type="text" id="f_name" class="feedback-input" placeholder="Your Name">
                <textarea id="f_msg" class="feedback-input" rows="3" placeholder="Your comments..."></textarea>
                <div style="display:flex; gap:10px;"><button class="btn-gold" onclick="submitFeedback()" style="flex:1; padding:12px; border:none; border-radius:12px; cursor:pointer;">Send</button><button onclick="closeFeedback()" style="background:none; border:none; color:#aaa; cursor:pointer;">Cancel</button></div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script>
        const fbCfg = {
            apiKey: "AIzaSyCwMxgmrfnsme4pgLx00tgjGCo-gQBMUo8",
            authDomain: "tallow-ahbabna.firebaseapp.com",
            projectId: "tallow-ahbabna",
            databaseURL: "https://tallow-ahbabna-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(fbCfg);
        const db = firebase.database();
        const REFS = { menu: db.ref('menu_items'), cats: db.ref('categories_meta'), home: db.ref('settings/home'), feed: db.ref('feedback') };

        let categories = [], menuItems = [];

        function renderAll() {
            let navHtml = '', sectionsHtml = '';
            categories.forEach(cat => {
                if(cat.status === 'hidden') return;
                navHtml += `<button class="cat-tab" onclick="document.getElementById('sec-${cat.id}').scrollIntoView({behavior:'smooth'})">
                    <i class="fa-solid ${cat.icon || 'fa-utensils'}"></i> ${cat.nameEn || cat.nameAr}
                </button>`;
                const items = menuItems.filter(i => i.category === cat.id && i.status !== 'inactive');
                if(items.length > 0) {
                    let itemsHtml = '';
                    items.forEach(item => {
                        itemsHtml += `<div class="menu-item-card"><div class="item-img-wrapper"><img src="${item.image || 'images/tallo-logo.png'}" loading="lazy" onerror="this.src='images/tallo-logo.png'">${item.price ? `<span class="item-price">${item.price} JD</span>` : ''}</div><div class="item-info"><h3>${item.nameEn || item.name}</h3><p>${item.descEn || item.desc || ''}</p></div></div>`;
                    });
                    sectionsHtml += `<section id="sec-${cat.id}" class="menu-section"><h2 class="sec-title">${cat.nameEn || cat.nameAr}</h2><p class="sec-desc">${cat.descEn || cat.descAr || ''}</p><div class="items-grid">${itemsHtml}</div></section>`;
                }
            });
            document.getElementById('category-tabs').innerHTML = navHtml;
            document.getElementById('menu-sections').innerHTML = sectionsHtml;
        }

        REFS.cats.on('value', s => { categories = []; s.forEach(c => categories.push({id: c.key, ...c.val()})); categories.sort((a,b) => (a.order||0)-(b.order||0)); renderAll(); });
        REFS.menu.on('value', s => { menuItems = []; s.forEach(m => menuItems.push({key: m.key, ...m.val()})); renderAll(); });
        REFS.home.on('value', s => { if(s.val() && s.val().tagline) document.getElementById('site-tagline').textContent = s.val().taglineEn || s.val().tagline; });

        let currentRating = 5;
        document.querySelectorAll('#stars i').forEach(s => { s.onclick = () => { currentRating = s.dataset.val; document.querySelectorAll('#stars i').forEach(st => st.classList.toggle('active', st.dataset.val <= currentRating)); }; });
        function openFeedback() { document.getElementById('feedbackModal').classList.add('active'); }
        function closeFeedback() { document.getElementById('feedbackModal').classList.remove('active'); }
        function submitFeedback() {
            const name = document.getElementById('f_name').value.trim() || 'Customer', message = document.getElementById('f_msg').value.trim();
            if(!message) return alert('Please write your comments');
            REFS.feed.push({ name, rating: currentRating, message, timestamp: Date.now() }).then(() => { alert('Thank you!'); closeFeedback(); });
        }
    </script>
</body>
</html>
