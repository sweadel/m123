<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطعم طلو أحبابنا | Tallo Ahbabna</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --gold: #C5A022; --dark: #0a0a0a; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'IBM Plex Sans Arabic', sans-serif; }
        body { background:var(--dark); color:#fff; overflow:hidden; }
        .hero { position:relative; height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:20px; }
        .bg-video { position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; opacity:0.4; z-index:-1; }
        .logo { width:180px; margin-bottom:30px; filter:drop-shadow(0 0 20px rgba(197,160,34,0.4)); }
        h1 { font-size:2.5rem; margin-bottom:15px; color:var(--gold); }
        p { font-size:1.2rem; margin-bottom:40px; color:#ccc; }
        .btn-group { display:flex; gap:20px; }
        .btn { padding:15px 40px; border-radius:50px; text-decoration:none; font-weight:700; transition:0.3s; font-size:1.1rem; }
        .btn-gold { background:var(--gold); color:#000; }
        .btn-gold:hover { transform:scale(1.05); box-shadow:0 0 30px rgba(197,160,34,0.5); }
    </style>
</head>
<body>
    <div class="hero">
        <video id="vbg" autoplay muted loop playsinline class="bg-video">
            <source src="" type="video/mp4">
        </video>
        <img src="images/tallo-logo.png" alt="طلو أحبابنا" class="logo">
        <h1 id="htitle">طلو أحبابنا</h1>
        <p id="htag">أهلاً بكم في عالمنا الخاص</p>
        <div class="btn-group">
            <a href="menu.html" class="btn btn-gold">تصفح المنيو</a>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script>
        const fbCfg = {
            apiKey: "AIzaSyCwMxgmrfnsme4pgLx00tgjGCo-gQBMUo8",
            authDomain: "tallow-ahbabna.firebaseapp.com",
            projectId: "tallow-ahbabna",
            databaseURL: "https://tallow-ahbabna-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(fbCfg);
        firebase.database().ref('settings/home').on('value', s => {
            const d = s.val(); if(!d) return;
            if(d.video) document.getElementById('vbg').querySelector('source').src = d.video;
            if(d.video) document.getElementById('vbg').load();
            if(d.tagline) document.getElementById('htag').textContent = d.tagline;
        });
    </script>
</body>
</html>
